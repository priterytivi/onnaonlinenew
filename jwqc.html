<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player QC</title>
<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>
body{
background:#000;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#player{
width:100%;
max-width:900px;
height:500px;
}

#skipBtn{
position:absolute;
top:20px;
right:20px;
background:#000;
color:#fff;
padding:8px 14px;
border-radius:5px;
font-size:14px;
cursor:pointer;
display:none;
opacity:0.8;
}

#countdown{
position:absolute;
top:20px;
right:20px;
background:#000;
color:#fff;
padding:8px 14px;
border-radius:5px;
font-size:14px;
opacity:0.8;
}
</style>
</head>

<body>

<div id="player"></div>
<div id="countdown">Skip in 3</div>
<div id="skipBtn">Skip Ad</div>

<script>

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

var videoURL = getParam("url");

var adVideo = "https://files.catbox.moe/zu5gca.mp4";

var player = jwplayer("player").setup({
file: adVideo,
width: "100%",
aspectratio: "16:9",
autostart: true
});

let time = 3;

let countdown = document.getElementById("countdown");
let skipBtn = document.getElementById("skipBtn");

let timer = setInterval(function(){

time--;
countdown.innerHTML = "Skip in " + time;

if(time <= 0){
clearInterval(timer);
countdown.style.display="none";
skipBtn.style.display="block";
}

},1000);

skipBtn.onclick = function(){

player.load([{file: videoURL}]);
player.play();

skipBtn.style.display="none";

}

</script>

</body>
</html>
