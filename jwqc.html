<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player QC</title>

<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#player{
position:absolute;
width:100%;
height:100%;
}

#skipBtn{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:8px 15px;
border-radius:4px;
font-size:14px;
cursor:pointer;
display:none;
z-index:999;
}

#countdown{
position:absolute;
top:20px;
right:20px;
background:rgba(0,0,0,0.7);
color:#fff;
padding:8px 15px;
border-radius:4px;
font-size:14px;
z-index:999;
}

</style>
</head>

<body>

<div id="player"></div>
<div id="countdown">Skip in 3</div>
<div id="skipBtn">Skip Ad</div>

<script>

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

var videoURL = getParam("url");

var adVideo = "https://files.catbox.moe/hquinz.mp4";

var player = jwplayer("player").setup({
file: adVideo,
autostart: true,
width:"100%",
height:"100%",
stretching:"fill"
});

let time = 3;

let countdown = document.getElementById("countdown");
let skipBtn = document.getElementById("skipBtn");

let timer = setInterval(function(){

time--;
countdown.innerHTML = "Skip in " + time;

if(time <= 0){

clearInterval(timer);
countdown.style.display="none";
skipBtn.style.display="block";

}

},1000);

skipBtn.onclick = function(){

player.load([{file: videoURL}]);
player.play();

skipBtn.style.display="none";

}

</script>

</body>
</html>
