<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Player Ads</title>

<script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>

<style>

html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
}

#player{
position:absolute;
width:100%;
height:100%;
}

#skipBtn{
position:absolute;
bottom:70px;
right:20px;
background:rgba(0,0,0,0.8);
color:#fff;
padding:10px 16px;
border-radius:4px;
font-size:14px;
cursor:not-allowed;
z-index:999;
}

</style>
</head>

<body>

<div id="player"></div>
<div id="skipBtn">Bỏ qua quảng cáo trong (3)</div>

<script>

function getParam(name){
let url = new URL(window.location.href);
return url.searchParams.get(name);
}

var videoURL = getParam("url");

var adVideo = "https://files.catbox.moe/hquinz.mp4";

var isAdPlaying = true;

var player = jwplayer("player").setup({

file: adVideo,
autostart: true,
controls: true,
width:"100%",
height:"100%",
stretching:"fill"

});

var skipBtn = document.getElementById("skipBtn");

var time = 3;

var timer = setInterval(function(){

time--;

if(time > 0){

skipBtn.innerHTML = "Bỏ qua quảng cáo trong ("+time+")";

}else{

clearInterval(timer);

skipBtn.innerHTML = "Bỏ qua quảng cáo";
skipBtn.style.cursor="pointer";

}

},1000);


skipBtn.onclick = function(){

if(time > 0) return;

player.load([{file: videoURL}]);
player.play();

skipBtn.style.display="none";

isAdPlaying = false;

};

player.on("seek", function(e){

if(isAdPlaying){

player.seek(0);

}

});

</script>

</body>
</html>
